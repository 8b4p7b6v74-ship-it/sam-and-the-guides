<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sam & the Guides — Fleet Hub</title>
<style>
  :root{--bg:#0a0c10;--panel:#12161d;--panel2:#161b23;--line:#20262f;--line2:#2a3240;
    --ink:#e9edf4;--muted:#7d8798;--accent:#4d8dff;--ok:#3ddc84;--warn:#ffb020;--bad:#ff5b5b;
    --f:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;--mono:"JetBrains Mono",ui-monospace,monospace;}
  @media(prefers-color-scheme:light){:root{--bg:#f5f7fa;--panel:#fff;--panel2:#f1f4f8;--line:#e3e8ef;--line2:#d5dce6;--ink:#1b2430;--muted:#5a6675;}}
  *{box-sizing:border-box}html,body{margin:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--f);min-height:100vh}
  header{position:sticky;top:0;z-index:10;background:var(--panel);border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:12px;padding:13px 22px}
  .mark{width:36px;height:36px;border-radius:10px;background:linear-gradient(150deg,var(--accent),#2a5cc0);display:grid;place-items:center}
  .mark svg{width:20px;height:20px}
  h1{font-size:16px;margin:0;font-weight:700}.sub{color:var(--muted);font-size:11px}
  .spacer{flex:1}
  button{font-family:var(--f);font-size:13.5px;font-weight:600;cursor:pointer;border:1px solid var(--line2);
    background:var(--panel2);color:var(--ink);border-radius:10px;padding:9px 13px;transition:.15s}
  button:hover{border-color:var(--accent)}
  .stop{background:var(--bad);border-color:var(--bad);color:#fff;font-weight:800}
  .wrap{max-width:1160px;margin:0 auto;padding:22px}
  .go{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line2);border-radius:16px;padding:16px;margin-bottom:18px}
  .go h2{font-size:13px;margin:0 0 12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
  .dests{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  @media(max-width:720px){.dests{grid-template-columns:repeat(2,1fr)}}
  .dests .d{display:flex;flex-direction:column;gap:6px;padding:14px;border-radius:12px;background:var(--panel2);border:1px solid var(--line);align-items:flex-start}
  .dests .d b{font-size:15px}.dests .d input{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:6px 8px;font-family:var(--mono);font-size:12px}
  .dests .d small{color:var(--muted);font-size:10.5px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  @media(max-width:820px){.grid{grid-template-columns:1fr}}
  .rc{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:14px;padding:15px}
  .rt{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .role{font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--muted)}
  .st{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:7px;background:var(--panel2);border:1px solid var(--line);color:var(--muted)}
  .st.on{color:var(--ok);border-color:rgba(61,220,132,.3)}.st.alert{color:var(--bad);border-color:rgba(255,91,91,.35)}
  .led{width:8px;height:8px;border-radius:50%;background:currentColor}
  .mission{font-size:22px;font-weight:700;margin:2px 0}
  .metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
  .metric{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:8px 10px}
  .metric .k{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
  .metric .v{font-family:var(--mono);font-size:17px;font-weight:600}
  .cols{display:grid;grid-template-columns:1fr;gap:14px;margin-top:16px}
  .panel{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:14px;padding:16px}
  .panel h2{font-size:13px;margin:0 0 12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
  .feed{max-height:260px;overflow:auto}
  .fi{display:flex;gap:10px;padding:8px 2px;border-bottom:1px solid var(--line);font-size:13px}
  .fi:last-child{border:none}.fi .t{font-family:var(--mono);color:var(--muted);font-size:11px}
  .fdot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex:none;background:var(--muted)}
  .fdot.alert{background:var(--bad)}.fdot.ok{background:var(--ok)}.fdot.turn{background:var(--warn)}
  .banner{background:rgba(255,176,32,.1);border:1px solid rgba(255,176,32,.3);border-radius:10px;padding:10px 13px;font-size:13px;margin-bottom:16px;display:none}
</style>
</head>
<body>
<header>
  <div class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="8" width="16" height="11" rx="3"/><path d="M12 8V4.5"/><circle cx="12" cy="3.4" r="1.2" fill="#fff" stroke="none"/><path d="M8.5 13h.01M15.5 13h.01"/><path d="M9.5 16.2c1.4.9 3.6.9 5 0"/></svg></div>
  <div><h1>Fleet Hub</h1><div class="sub">Sam &amp; the Guides · coordinator</div></div>
  <span class="spacer"></span>
  <span class="st" id="fleetSt"><span class="led"></span><span id="online">0 online</span></span>
  <button class="stop" onclick="stopAll()">■ STOP ALL</button>
</header>

<div class="wrap">
  <div class="banner" id="btWarn">⚠️ Web Bluetooth unavailable — open in desktop Chrome over localhost/https.</div>

  <div class="go">
    <h2>Destinations — route = markers · S straight · L left · R right · A arrive</h2>
    <div class="dests" id="dests"></div>
  </div>

  <div class="grid" id="robots"></div>

  <div class="cols">
    <div class="panel"><h2>Activity</h2><div class="feed" id="feed"></div></div>
  </div>
</div>

<script>
const NUS="6e400001-b5a3-f393-e0a9-e50e24dcca9e",RX="6e400002-b5a3-f393-e0a9-e50e24dcca9e",TX="6e400003-b5a3-f393-e0a9-e50e24dcca9e";
const ROLES=["LEAD","GUARD","COMPANION"];
const DESTS=[
  {key:"store",name:"Store",route:"SSRA"},
  {key:"bathroom",name:"Bathroom",route:"SLA"},
  {key:"reception",name:"Reception",route:"SA"},
  {key:"dining",name:"Dining room",route:"SSLA"}
];
const slots=[null,null,null];
const bc=("BroadcastChannel" in window)?new BroadcastChannel("companion"):null;
const $=s=>document.querySelector(s);
const nowStr=()=>new Date().toLocaleTimeString("en-GB",{hour12:false});

function renderDests(){
  $("#dests").innerHTML=DESTS.map((d,i)=>`<div class="d"><b>${d.name}</b>
    <input id="rt${i}" value="${d.route}" spellcheck="false">
    <small>marker actions</small>
    <button style="width:100%;margin-top:4px" onclick="dispatch(${i})">▶ Go</button></div>`).join("");
}
function renderRobots(){
  const host=$("#robots");host.innerHTML="";
  for(let i=0;i<3;i++){const s=slots[i],on=s&&s.connected;
    const c=document.createElement("div");c.className="rc";
    c.innerHTML=`<div class="rt"><span class="role">${ROLES[i]}</span><span class="spacer" style="flex:1"></span>
      <span class="st ${on?(s.alert?'alert':'on'):''}" id="stp${i}"><span class="led"></span>${on?(s.alert?'ALERT':'ONLINE'):'OFFLINE'}</span>
      <button class="small" style="padding:6px 10px;font-size:12px" onclick="${on?`disc(${i})`:`conn(${i})`}">${on?'Disconnect':'Connect'}</button></div>
      <div class="mission" id="m${i}">${on?(s.mission||'—'):'Offline'}</div>
      <div class="metrics">
        <div class="metric"><div class="k">Distance</div><div class="v" id="d${i}">—</div></div>
        <div class="metric"><div class="k">Marker</div><div class="v" id="mk${i}">—</div></div>
        <div class="metric"><div class="k">State</div><div class="v" id="ss${i}" style="font-size:13px">—</div></div>
        <div class="metric"><div class="k">Line L·R</div><div class="v" id="lr${i}" style="font-size:13px">—</div></div>
      </div>`;
    host.appendChild(c);}
  updateSummary();
}
function updateSummary(){const n=slots.filter(s=>s&&s.connected).length,al=slots.some(s=>s&&s.alert);
  $("#online").textContent=n+" online";$("#fleetSt").className="st "+(al?"alert":(n?"on":""));}

async function conn(i){
  if(!navigator.bluetooth){$("#btWarn").style.display="block";return;}
  try{const dev=await navigator.bluetooth.requestDevice({acceptAllDevices:true,optionalServices:[NUS]});
    const srv=await dev.gatt.connect(),svc=await srv.getPrimaryService(NUS);
    const rx=await svc.getCharacteristic(RX),tx=await svc.getCharacteristic(TX);
    await tx.startNotifications();const buf={s:""};
    tx.addEventListener("characteristicvaluechanged",e=>{buf.s+=new TextDecoder().decode(e.target.value);let k;while((k=buf.s.indexOf("\n"))>=0){const ln=buf.s.slice(0,k).trim();buf.s=buf.s.slice(k+1);if(ln)parse(i,ln);}});
    dev.addEventListener("gattserverdisconnected",()=>{if(slots[i])slots[i].connected=false;renderRobots();log("info",ROLES[i]+" disconnected");});
    slots[i]={dev,rx,connected:true,mission:"IDLE",dist:null,marker:0,state:"",alert:false};
    send(i,"ROLE "+ROLES[i]);
    renderRobots();log("ok",ROLES[i]+" connected — role assigned");
  }catch(e){log("info","Connect cancelled: "+e.message);}
}
function disc(i){try{slots[i]&&slots[i].dev.gatt.disconnect();}catch(e){}if(slots[i])slots[i].connected=false;renderRobots();}
function send(i,str){const s=slots[i];if(!s||!s.connected)return;try{const d=new TextEncoder().encode(str+"\n");(s.rx.writeValueWithoutResponse?s.rx.writeValueWithoutResponse(d):s.rx.writeValue(d));}catch(e){}}
function sendAll(str){for(let i=0;i<3;i++)if(slots[i]&&slots[i].connected)send(i,str);}

function dispatch(di){
  const d=DESTS[di],route=($("#rt"+di).value||d.route).toUpperCase();
  const lead=leadIndex();
  if(lead<0){log("info","No LEAD connected — connect Robot 1 first");}
  else send(lead,"ROUTE "+route);
  sendAll("GO");
  log("ok","→ "+d.name+"  (route "+route+")");
  if(bc)bc.postMessage({kind:"event",e:{t:nowStr(),kind:"info",text:"Heading to "+d.name}});
}
function leadIndex(){for(let i=0;i<3;i++)if(slots[i]&&slots[i].connected&&ROLES[i]==="LEAD")return i;return -1;}
function stopAll(){sendAll("STOP");log("alert","STOP ALL");if(bc)bc.postMessage({kind:"event",e:{t:nowStr(),kind:"alert",text:"Emergency stop"}});}

function parse(i,line){
  const s=slots[i];if(!s)return;const p=line.split("|");
  if(p[0]==="T"){s.mission=p[2];s.dist=parseFloat(p[3]);s.marker=parseInt(p[6]);s.state=p[7];s.alert=(p[7]==="ALERT");
    setT(i,s,p[4],p[5]);updateSummary();}
  else if(p[0]==="E"){const t=p[1],m=p[2]||"";
    if(t==="ALERT"){log("alert","⚠ Obstacle — "+ROLES[i]+" — STOPPING FLEET");stopAll();relay("alert","Obstacle ahead. Stopping.");}
    else if(t==="TURN"){log("turn","Turn "+m+" — "+ROLES[i]);relay("turn","Turning "+m+".");}
    else if(t==="MARK"){log("info","Marker "+m+" — "+ROLES[i]);}
    else if(t==="ARRIVE"){log("ok","Arrived — "+ROLES[i]);relay("ok","You have arrived.");}
    else if(t==="ROLE"){log("info",ROLES[i]+" ready");}
    else if(t==="READY"){log("ok",ROLES[i]+" firmware ready");}}
}
function setT(i,s,l,r){const set=(id,v)=>{const e=document.getElementById(id+i);if(e)e.textContent=v;};
  set("m",s.mission||"—");set("d",s.dist!=null?s.dist.toFixed(0)+" cm":"—");set("mk",s.marker||"0");set("ss",s.state||"—");set("lr",(parseFloat(l)).toFixed(2)+" · "+(parseFloat(r)).toFixed(2));
  const p=document.getElementById("stp"+i);if(p){p.className="st "+(s.alert?"alert":"on");p.innerHTML='<span class="led"></span>'+(s.alert?"ALERT":"ONLINE");}}

const FEED=[];
function log(kind,text){FEED.unshift({t:nowStr(),kind,text});if(FEED.length>120)FEED.pop();
  $("#feed").innerHTML=FEED.slice(0,50).map(e=>`<div class="fi"><span class="fdot ${e.kind}"></span><div>${e.text}<div class="t">${e.t}</div></div></div>`).join("");}
function relay(kind,text){if(bc)bc.postMessage({kind:"event",e:{t:nowStr(),kind,text}});}

// let the voice interface trigger a destination by name
if(bc)bc.onmessage=ev=>{const d=ev.data;if(d&&d.kind==="mission"&&d.dest){const idx=DESTS.findIndex(x=>x.key===d.dest);if(idx>=0)dispatch(idx);}};

renderDests();renderRobots();
if(!navigator.bluetooth)$("#btWarn").style.display="block";
</script>
</body>
</html>
